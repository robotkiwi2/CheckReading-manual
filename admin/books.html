<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도서 관리 · CheckReading Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50" x-data="booksApp()">

<!-- Sidebar -->
<div class="fixed inset-y-0 left-0 w-60 bg-white border-r border-gray-200 flex flex-col z-30">
  <div class="flex items-center gap-3 px-5 py-5 border-b border-gray-100">
    <div class="w-8 h-8 bg-blue-700 rounded-lg flex items-center justify-center">
      <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
      </svg>
    </div>
    <div>
      <div class="text-sm font-bold text-gray-900">CheckReading</div>
      <div class="text-xs text-gray-400">Admin Console</div>
    </div>
  </div>
  <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
    <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50 text-sm">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      대시보드
    </a>
    <a href="users.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50 text-sm">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
      회원 관리
    </a>
    <a href="books.html" class="flex items-center gap-3 px-3 py-2 rounded-lg bg-blue-50 text-blue-700 text-sm font-medium">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
      도서 관리
    </a>
    <a href="subscriptions.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50 text-sm">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
      구독 관리
    </a>
    <a href="notifications.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50 text-sm">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
      알림 관리
    </a>
  </nav>
  <div class="px-3 py-4 border-t border-gray-100">
    <div class="flex items-center gap-3 px-3 py-2">
      <div class="w-7 h-7 bg-blue-100 rounded-full flex items-center justify-center text-blue-700 text-xs font-bold">관</div>
      <div class="flex-1 min-w-0">
        <div class="text-xs font-medium text-gray-800">관리자</div>
        <div class="text-xs text-gray-400">admin@readerseye.com</div>
      </div>
      <button @click="logout()" class="text-gray-400 hover:text-gray-600">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Main -->
<div class="ml-60">
  <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
    <div>
      <h1 class="text-lg font-semibold text-gray-900">도서 관리</h1>
      <p class="text-xs text-gray-400 mt-0.5">전체 <span x-text="filtered.length"></span>권</p>
    </div>
    <button @click="openAddBook()" class="flex items-center gap-2 bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-800">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      도서 추가
    </button>
  </header>

  <main class="p-6">
    <!-- Filters -->
    <div class="flex items-center gap-3 mb-4">
      <div class="relative flex-1 max-w-xs">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input x-model="search" type="text" placeholder="제목, 작가 검색"
          class="w-full pl-9 pr-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <select x-model="filterGenre" class="text-sm border border-gray-200 rounded-lg px-3 py-2 text-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="">전체 장르</option>
        <template x-for="g in genres" :key="g"><option x-text="g"></option></template>
      </select>
      <select x-model="filterLevel" class="text-sm border border-gray-200 rounded-lg px-3 py-2 text-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="">전체 레벨</option>
        <option>초급</option>
        <option>중급</option>
        <option>고급</option>
      </select>
      <select x-model="filterStatus" class="text-sm border border-gray-200 rounded-lg px-3 py-2 text-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="">전체 상태</option>
        <option>공개</option>
        <option>비공개</option>
      </select>
    </div>

    <!-- Book Grid -->
    <div class="grid grid-cols-5 gap-4">
      <template x-for="b in paginated" :key="b.title">
        <div class="bg-white rounded-xl border border-gray-100 overflow-hidden cursor-pointer hover:shadow-md transition-shadow" @click="openDetail(b)">
          <!-- Cover -->
          <div class="h-44 flex items-end p-3" :style="`background:${b.color}`">
            <div>
              <div class="text-white font-bold text-sm leading-tight line-clamp-2" x-text="b.title"></div>
              <div class="text-white/70 text-xs mt-1" x-text="b.author"></div>
            </div>
          </div>
          <div class="p-3">
            <div class="flex items-center justify-between mb-2">
              <span class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-600" x-text="b.genre"></span>
              <span class="text-xs px-2 py-0.5 rounded-full"
                :class="b.level === '초급' ? 'bg-green-50 text-green-600' : b.level === '중급' ? 'bg-yellow-50 text-yellow-600' : 'bg-red-50 text-red-500'"
                x-text="b.level"></span>
            </div>
            <div class="flex items-center justify-between text-xs text-gray-500">
              <span x-text="b.words.toLocaleString() + '단어'"></span>
              <div class="flex items-center gap-1">
                <div class="w-1.5 h-1.5 rounded-full" :class="b.status === '공개' ? 'bg-green-400' : 'bg-gray-300'"></div>
                <span x-text="b.status"></span>
              </div>
            </div>
            <div class="mt-2 text-xs text-gray-400">
              읽기 <span class="font-medium text-gray-700" x-text="b.reads + '회'"></span>
            </div>
          </div>
        </div>
      </template>
    </div>

    <!-- Pagination -->
    <div class="flex items-center justify-center gap-1 mt-6">
      <button @click="page = Math.max(1, page - 1)" :disabled="page === 1"
        class="px-3 py-1.5 text-xs border border-gray-200 rounded-md text-gray-600 disabled:opacity-40 hover:bg-gray-50">이전</button>
      <template x-for="p in totalPages" :key="p">
        <button @click="page = p" class="w-7 h-7 text-xs rounded-md"
          :class="page === p ? 'bg-blue-700 text-white' : 'text-gray-600 hover:bg-gray-50'"
          x-text="p"></button>
      </template>
      <button @click="page = Math.min(totalPages, page + 1)" :disabled="page === totalPages"
        class="px-3 py-1.5 text-xs border border-gray-200 rounded-md text-gray-600 disabled:opacity-40 hover:bg-gray-50">다음</button>
    </div>
  </main>
</div>

<!-- Book detail / edit panel -->
<div x-show="selectedBook || addMode"
  x-transition:enter="transition ease-out duration-200" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0"
  x-transition:leave="transition ease-in duration-150" x-transition:leave-start="translate-x-0" x-transition:leave-end="translate-x-full"
  class="fixed inset-y-0 right-0 w-96 bg-white shadow-xl border-l border-gray-200 z-40 overflow-y-auto transform"
  style="display:none">
  <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
    <h2 class="text-sm font-semibold text-gray-900" x-text="addMode ? '도서 추가' : '도서 상세'"></h2>
    <button @click="closePanel()" class="text-gray-400 hover:text-gray-600">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>

  <div class="p-5">
    <!-- Cover preview -->
    <div class="h-40 rounded-xl mb-5 flex items-end p-4"
      :style="`background:${form.color || '#2e4f8f'}`">
      <div>
        <div class="text-white font-bold text-base leading-tight" x-text="form.title || '제목 없음'"></div>
        <div class="text-white/70 text-sm mt-1" x-text="form.author || '저자 미입력'"></div>
      </div>
    </div>

    <!-- Form -->
    <div class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">제목</label>
        <input x-model="form.title" type="text" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">저자</label>
        <input x-model="form.author" type="text" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">장르</label>
          <select x-model="form.genre" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <template x-for="g in genres" :key="g"><option x-text="g"></option></template>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">레벨</label>
          <select x-model="form.level" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option>초급</option><option>중급</option><option>고급</option>
          </select>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">단어 수</label>
          <input x-model.number="form.words" type="number" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1">표지 색상</label>
          <input x-model="form.color" type="color" class="w-full h-9 border border-gray-200 rounded-lg cursor-pointer px-1 py-1">
        </div>
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">공개 상태</label>
        <div class="flex gap-3">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" x-model="form.status" value="공개" class="text-blue-600">
            <span class="text-sm text-gray-700">공개</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" x-model="form.status" value="비공개" class="text-blue-600">
            <span class="text-sm text-gray-700">비공개</span>
          </label>
        </div>
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">설명</label>
        <textarea x-model="form.description" rows="3" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
      </div>
    </div>

    <!-- Stats (edit mode only) -->
    <template x-if="!addMode && selectedBook">
      <div class="mt-5 pt-5 border-t border-gray-100">
        <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">통계</h3>
        <div class="grid grid-cols-3 gap-3">
          <div class="bg-gray-50 rounded-xl p-3 text-center">
            <div class="text-lg font-bold text-gray-900" x-text="selectedBook.reads"></div>
            <div class="text-xs text-gray-500">총 읽기</div>
          </div>
          <div class="bg-gray-50 rounded-xl p-3 text-center">
            <div class="text-lg font-bold text-gray-900" x-text="selectedBook.avgWpm"></div>
            <div class="text-xs text-gray-500">평균 WPM</div>
          </div>
          <div class="bg-gray-50 rounded-xl p-3 text-center">
            <div class="text-lg font-bold text-gray-900" x-text="selectedBook.avgScore + '%'"></div>
            <div class="text-xs text-gray-500">평균 퀴즈</div>
          </div>
        </div>
      </div>
    </template>

    <!-- Actions -->
    <div class="mt-5 space-y-2">
      <button @click="saveBook()"
        class="w-full bg-blue-700 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-blue-800">
        <span x-text="addMode ? '도서 추가' : '저장'"></span>
      </button>
      <template x-if="!addMode">
        <button @click="toggleStatus()"
          class="w-full py-2.5 border rounded-lg text-sm font-medium"
          :class="form.status === '공개' ? 'border-yellow-200 text-yellow-600 hover:bg-yellow-50' : 'border-green-200 text-green-600 hover:bg-green-50'"
          x-text="form.status === '공개' ? '비공개로 전환' : '공개로 전환'">
        </button>
      </template>
    </div>
  </div>
</div>

<script>
function booksApp() {
  const colors = ['#2e4f8f','#5c2e8c','#1e6840','#8a2424','#7a5c1e','#1e5c6e','#6e1e5c','#3d6e1e','#1e3d6e','#6e3d1e'];
  const books = [
    { title:"Charlotte's Web", author:'E.B. White', genre:'소설', level:'초급', words:31938, color:'#2e4f8f', status:'공개', reads:312, avgWpm:142, avgScore:81, description:"A beloved classic about friendship between a pig named Wilbur and a spider named Charlotte." },
    { title:'The BFG', author:'Roald Dahl', genre:'판타지', level:'초급', words:44512, color:'#5c2e8c', status:'공개', reads:278, avgWpm:138, avgScore:76, description:"A big friendly giant and a little girl named Sophie go on an extraordinary adventure." },
    { title:'Holes', author:'Louis Sachar', genre:'소설', level:'중급', words:47079, color:'#1e6840', status:'공개', reads:241, avgWpm:161, avgScore:84, description:"Stanley Yelnats is sent to a detention center where the boys dig holes every day." },
    { title:'Wonder', author:'R.J. Palacio', genre:'소설', level:'중급', words:73053, color:'#8a2424', status:'공개', reads:198, avgWpm:155, avgScore:79, description:"August Pullman was born with a facial difference. This is the story of his first year at a mainstream school." },
    { title:'Matilda', author:'Roald Dahl', genre:'판타지', level:'초급', words:39309, color:'#7a5c1e', status:'공개', reads:187, avgWpm:140, avgScore:82, description:"Matilda is a brilliant girl with a gift for mischief and a love of books." },
    { title:'Harry Potter and the Sorcerer\'s Stone', author:'J.K. Rowling', genre:'판타지', level:'중급', words:77325, color:'#1e5c6e', status:'공개', reads:176, avgWpm:172, avgScore:88, description:"Harry Potter learns he's a wizard and begins his magical education at Hogwarts." },
    { title:'The Giver', author:'Lois Lowry', genre:'SF', level:'고급', words:43617, color:'#6e1e5c', status:'공개', reads:154, avgWpm:168, avgScore:72, description:"Jonas lives in a seemingly perfect community. Then he is chosen for an extraordinary role." },
    { title:'James and the Giant Peach', author:'Roald Dahl', genre:'판타지', level:'초급', words:26000, color:'#3d6e1e', status:'공개', reads:142, avgWpm:135, avgScore:80, description:"James escapes his horrible life with aunts by embarking on a magical journey inside a giant peach." },
    { title:'A Wrinkle in Time', author:'Madeleine L\'Engle', genre:'SF', level:'고급', words:49965, color:'#1e3d6e', status:'공개', reads:128, avgWpm:163, avgScore:71, description:"Meg Murry and friends travel through time and space to rescue her father from evil." },
    { title:'Island of the Blue Dolphins', author:'Scott O\'Dell', genre:'소설', level:'중급', words:41000, color:'#6e3d1e', status:'공개', reads:115, avgWpm:150, avgScore:77, description:"A Native American girl survives alone on an island for years after her tribe leaves." },
    { title:'Number the Stars', author:'Lois Lowry', genre:'역사', level:'중급', words:27197, color:'#2e4f8f', status:'공개', reads:108, avgWpm:158, avgScore:83, description:"A story of friendship and bravery during the German occupation of Denmark." },
    { title:'My Father\'s Dragon', author:'Ruth Stiles Gannett', genre:'판타지', level:'초급', words:12000, color:'#5c2e8c', status:'공개', reads:98, avgWpm:128, avgScore:85, description:"Elmer Elevator rescues a baby dragon from wild animals on a remote island." },
    { title:'The Phantom Tollbooth', author:'Norton Juster', genre:'판타지', level:'고급', words:46880, color:'#1e6840', status:'비공개', reads:87, avgWpm:145, avgScore:69, description:"A bored boy named Milo suddenly finds a magic tollbooth appearing in his room." },
    { title:'Sarah, Plain and Tall', author:'Patricia MacLachlan', genre:'역사', level:'초급', words:7600, color:'#8a2424', status:'공개', reads:76, avgWpm:132, avgScore:87, description:"Jacob Witting, a widower with two children, advertises for a wife from the East." },
    { title:'Bud, Not Buddy', author:'Christopher Paul Curtis', genre:'역사', level:'중급', words:54000, color:'#7a5c1e', status:'공개', reads:65, avgWpm:153, avgScore:78, description:"A ten-year-old orphan searches for the man he believes to be his father during the Great Depression." },
  ];

  return {
    search: '',
    filterGenre: '',
    filterLevel: '',
    filterStatus: '',
    page: 1,
    pageSize: 10,
    selectedBook: null,
    addMode: false,
    form: {},
    genres: ['소설','판타지','SF','역사','자연','과학'],
    books,
    get filtered() {
      return this.books.filter(b => {
        const q = this.search.toLowerCase();
        const matchQ = !q || b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q);
        const matchGenre = !this.filterGenre || b.genre === this.filterGenre;
        const matchLevel = !this.filterLevel || b.level === this.filterLevel;
        const matchStatus = !this.filterStatus || b.status === this.filterStatus;
        return matchQ && matchGenre && matchLevel && matchStatus;
      });
    },
    get paginated() {
      return this.filtered.slice((this.page - 1) * this.pageSize, this.page * this.pageSize);
    },
    get totalPages() {
      return Math.max(1, Math.ceil(this.filtered.length / this.pageSize));
    },
    openDetail(b) {
      this.addMode = false;
      this.selectedBook = b;
      this.form = { ...b };
    },
    openAddBook() {
      this.selectedBook = null;
      this.addMode = true;
      this.form = { title:'', author:'', genre:'소설', level:'초급', words:0, color:'#2e4f8f', status:'공개', description:'' };
    },
    closePanel() {
      this.selectedBook = null;
      this.addMode = false;
    },
    saveBook() {
      if (this.addMode) {
        this.books.unshift({ ...this.form, reads:0, avgWpm:0, avgScore:0 });
      } else {
        Object.assign(this.selectedBook, this.form);
      }
      this.closePanel();
    },
    toggleStatus() {
      this.form.status = this.form.status === '공개' ? '비공개' : '공개';
    },
    logout() {
      localStorage.removeItem('cr_admin');
      location.href = 'index.html';
    }
  }
}
</script>
</body>
</html>
