<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>책장 - CheckReading</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
<div class="w-full max-w-sm bg-gray-50 min-h-screen shadow-xl relative flex flex-col"
     x-data="app()" x-init="init()">

  <!-- 헤더 -->
  <header class="sticky top-0 z-10 bg-white border-b border-gray-100 px-4 pt-3 pb-0">
    <div class="flex items-center justify-between mb-3">
      <h1 class="font-bold text-gray-900">책장</h1>

      <!-- 유저 버튼 -->
      <div class="relative">
        <button @click="showMenu = !showMenu"
          class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center text-xs font-bold text-indigo-600 select-none"
          x-text="user?.initial || '?'">
        </button>

        <!-- 유저 팝업 -->
        <div x-show="showMenu" x-cloak
             @click.outside="showMenu = false"
             x-transition:enter="transition ease-out duration-150"
             x-transition:enter-start="opacity-0 scale-95"
             x-transition:enter-end="opacity-100 scale-100"
             class="absolute top-10 right-0 bg-white rounded-2xl shadow-xl border border-gray-100 w-44 overflow-hidden z-50">
          <div class="px-4 py-3 border-b border-gray-100">
            <p class="text-xs text-gray-400" x-text="user?.type === 'parent' ? '부모' : '학생'"></p>
            <p class="text-sm font-semibold text-gray-800" x-text="user?.name"></p>
          </div>
          <button class="w-full px-4 py-3 text-sm text-left text-gray-700 hover:bg-gray-50 flex items-center gap-2">
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            정보 보기
          </button>
          <button @click="logout()"
            class="w-full px-4 py-3 text-sm text-left text-red-500 hover:bg-red-50 flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            로그아웃
          </button>
        </div>
      </div>
    </div>

    <!-- 탭 -->
    <div class="flex gap-0 overflow-x-auto no-scrollbar">
      <template x-for="t in tabs" :key="t.id">
        <button @click="activeTab = t.id"
          :class="activeTab === t.id ? 'border-b-2 border-indigo-600 text-indigo-600 font-semibold' : 'text-gray-400 border-b-2 border-transparent'"
          class="flex-none px-4 py-2 text-sm whitespace-nowrap transition-colors">
          <span x-text="t.label"></span>
          <span class="ml-1 text-[10px]"
                :class="activeTab === t.id ? 'text-indigo-400' : 'text-gray-300'"
                x-text="'(' + t.books.length + ')'"></span>
        </button>
      </template>
    </div>
  </header>

  <!-- 콘텐츠 -->
  <div class="flex-1 overflow-y-auto pb-20 p-4">
    <template x-for="t in tabs" :key="t.id">
      <div x-show="activeTab === t.id">
        <div x-show="t.books.length === 0" class="flex flex-col items-center justify-center py-20 text-gray-300">
          <svg class="w-12 h-12 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
          </svg>
          <p class="text-sm">아직 책이 없어요</p>
        </div>
        <div x-show="t.books.length > 0" class="grid grid-cols-3 gap-3">
          <template x-for="book in t.books" :key="book.id">
            <div class="cursor-pointer group">
              <div class="w-full aspect-[3/4] rounded-xl mb-1.5 flex items-end p-2.5 shadow-sm transition group-hover:scale-105 relative"
                   :style="`background: ${book.color}`">
                <div x-show="book.progress !== undefined" class="absolute bottom-0 left-0 right-0 h-1.5 bg-black/20 rounded-b-xl overflow-hidden">
                  <div class="h-full bg-white/70 transition-all" :style="`width: ${book.progress}%`"></div>
                </div>
                <div x-show="book.done" class="absolute top-2 right-2 bg-yellow-400 text-yellow-900 text-[9px] font-bold px-1.5 py-0.5 rounded-full">완독</div>
                <span class="text-white text-[10px] font-bold leading-tight drop-shadow" x-text="book.title"></span>
              </div>
              <p class="text-[11px] text-gray-700 font-medium leading-tight truncate" x-text="book.title"></p>
              <p class="text-[10px] text-gray-400 truncate" x-text="book.author"></p>
              <p x-show="book.progress !== undefined" class="text-[10px] text-indigo-500 font-medium mt-0.5" x-text="book.progress + '% 읽음'"></p>
            </div>
          </template>
        </div>
      </div>
    </template>
  </div>

  <!-- 하단 탭바 -->
  <nav class="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex z-10">
    <a href="bookstore.html" class="flex-1 flex flex-col items-center py-2 gap-0.5 text-gray-300">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      <span class="text-[10px]">서점</span>
    </a>
    <a href="bookshelf.html" class="flex-1 flex flex-col items-center py-2 gap-0.5 text-indigo-600">
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 14c1.669 0 3.218.51 4.5 1.385A7.962 7.962 0 0114.5 14c1.255 0 2.443.29 3.5.804v-10A7.968 7.968 0 0014.5 4c-1.255 0-2.443.29-3.5.804V12a1 1 0 11-2 0V4.804z"/></svg>
      <span class="text-[10px] font-semibold">책장</span>
    </a>
    <a href="#" class="flex-1 flex flex-col items-center py-2 gap-0.5 text-gray-300">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
      <span class="text-[10px]">읽기</span>
    </a>
    <a href="#" class="flex-1 flex flex-col items-center py-2 gap-0.5 text-gray-300">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
      <span class="text-[10px]">결과</span>
    </a>
  </nav>

</div>
<script>
function app() {
  const colors = [
    'linear-gradient(135deg, #667eea, #764ba2)',
    'linear-gradient(135deg, #f093fb, #f5576c)',
    'linear-gradient(135deg, #4facfe, #00f2fe)',
    'linear-gradient(135deg, #43e97b, #38f9d7)',
    'linear-gradient(135deg, #fa709a, #fee140)',
    'linear-gradient(135deg, #a18cd1, #fbc2eb)',
  ];
  const mk = (list) => list.map((b, i) => ({ id: i, ...b, color: colors[i % colors.length] }));

  return {
    user: null,
    showMenu: false,
    activeTab: 'reading',

    init() {
      this.user = JSON.parse(localStorage.getItem('cr_user') || 'null');
      if (!this.user) window.location.href = 'login.html';
    },

    logout() {
      localStorage.removeItem('cr_user');
      window.location.href = 'login.html';
    },

    tabs: [
      { id: 'reading', label: '읽고 있는 책',
        books: mk([
          { title: 'Percy Jackson',        author: 'R. Riordan',   progress: 42 },
          { title: 'Magic Tree House #5',  author: 'M. Osborne',   progress: 78 },
          { title: "Charlotte's Web",      author: 'E.B. White',   progress: 15 },
        ])
      },
      { id: 'done', label: '읽은 책',
        books: mk([
          { title: 'Frindle',              author: 'A. Clements',  done: true },
          { title: 'Stuart Little',        author: 'E.B. White',   done: true },
          { title: 'Matilda',              author: 'R. Dahl',      done: true },
          { title: 'Magic Tree House #1',  author: 'M. Osborne',   done: true },
          { title: 'Magic Tree House #2',  author: 'M. Osborne',   done: true },
        ])
      },
      { id: 'wish', label: '찜한 책',
        books: mk([
          { title: 'Harry Potter 1',       author: 'J.K. Rowling' },
          { title: 'Wonder',               author: 'R.J. Palacio' },
          { title: 'The Giver',            author: 'L. Lowry' },
        ])
      },
      { id: 'must', label: '필독서',
        books: mk([
          { title: "Charlotte's Web",      author: 'E.B. White' },
          { title: 'The One and Only Ivan',author: 'K. Applegate' },
        ])
      },
    ]
  }
}
</script>
</body>
</html>
