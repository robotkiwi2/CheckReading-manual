<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프로필 - CheckReading</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style> html,body{height:100%;} [x-cloak]{display:none!important;} </style>
</head>
<body class="bg-gray-200" style="height:100dvh;overflow:hidden;">
<div class="h-full flex items-stretch justify-center bg-gray-200" x-data="app()" x-init="init()">

  <!-- 사이드바 (lg+) -->
  <aside class="hidden lg:flex flex-col w-56 bg-white border-r border-gray-100 flex-shrink-0">
    <div class="px-5 py-5 border-b border-gray-100 flex items-center gap-3">
      <div class="w-8 h-8 bg-indigo-600 rounded-xl flex items-center justify-center"><span class="text-white text-xs font-bold">CR</span></div>
      <span class="font-bold text-gray-900">CheckReading</span>
    </div>
    <nav class="flex-1 py-4 px-3 flex flex-col gap-1">
      <a href="profiles.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-indigo-50 text-indigo-600 font-semibold text-sm"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v1h8v-1zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-1a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v1h-3zM4.75 12.094A5.973 5.973 0 004 15v1H1v-1a3 3 0 013.75-2.906z"/></svg>프로필</a>
      <a href="chat.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 hover:bg-gray-50 text-sm"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>소통</a>
      <a href="bookstore.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 hover:bg-gray-50 text-sm"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>서점</a>
      <a href="bookshelf.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 hover:bg-gray-50 text-sm"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>내 책장</a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 hover:bg-gray-50 text-sm"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>내 정보</a>
    </nav>
    <div class="px-4 py-4 border-t border-gray-100 flex items-center gap-3 relative">
      <button @click="showMenu=!showMenu" class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center text-xs font-bold text-indigo-600 flex-shrink-0" x-text="user?.initial||'?'"></button>
      <div class="flex-1 min-w-0"><p class="text-sm font-semibold text-gray-800 truncate" x-text="user?.name"></p><p class="text-xs text-gray-400">부모</p></div>
      <div x-show="showMenu" x-cloak @click.outside="showMenu=false" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100" class="absolute bottom-16 left-3 bg-white rounded-2xl shadow-xl border border-gray-100 w-44 overflow-hidden z-50">
        <button class="w-full px-4 py-3 text-sm text-left text-gray-700 hover:bg-gray-50 flex items-center gap-2"><svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>정보 보기</button>
        <button @click="logout()" class="w-full px-4 py-3 text-sm text-left text-red-500 hover:bg-red-50 flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>로그아웃</button>
      </div>
    </div>
  </aside>

  <!-- 메인 -->
  <div class="flex-1 flex flex-col min-w-0 bg-gray-50 max-w-3xl">

    <header class="flex-shrink-0 bg-white border-b border-gray-100 px-4 py-3 flex items-center justify-between">
      <span class="font-bold text-gray-900">프로필</span>
      <div class="relative">
        <button @click="showMenu=!showMenu" class="lg:hidden w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center text-xs font-bold text-indigo-600" x-text="user?.initial||'?'"></button>
        <div x-show="showMenu" x-cloak @click.outside="showMenu=false" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100" class="lg:hidden absolute top-10 right-0 bg-white rounded-2xl shadow-xl border border-gray-100 w-44 overflow-hidden z-50">
          <div class="px-4 py-3 border-b border-gray-100"><p class="text-xs text-gray-400">부모</p><p class="text-sm font-semibold text-gray-800" x-text="user?.name"></p></div>
          <button class="w-full px-4 py-3 text-sm text-left text-gray-700 hover:bg-gray-50 flex items-center gap-2"><svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>정보 보기</button>
          <button @click="logout()" class="w-full px-4 py-3 text-sm text-left text-red-500 hover:bg-red-50 flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>로그아웃</button>
        </div>
      </div>
    </header>

    <!-- 탭바 -->
    <div class="flex-shrink-0 bg-white border-b border-gray-100 flex">
      <button @click="activeTab='my'"
              :class="activeTab==='my' ? 'border-b-2 border-indigo-600 text-indigo-600 font-semibold' : 'text-gray-400'"
              class="flex-1 py-3 text-sm transition-colors">나의 프로필</button>
      <button @click="activeTab='favorites'"
              :class="activeTab==='favorites' ? 'border-b-2 border-indigo-600 text-indigo-600 font-semibold' : 'text-gray-400'"
              class="flex-1 py-3 text-sm transition-colors">즐겨찾는 프로필</button>
    </div>

    <main class="flex-1 overflow-y-auto min-h-0 p-5">

      <!-- 나의 프로필 탭 -->
      <div x-show="activeTab==='my'">
        <p class="text-sm text-gray-400 mb-4">자녀 프로필을 선택하세요</p>
        <div class="flex flex-col gap-4 mb-4">
          <template x-for="p in profiles" :key="p.id">
            <div @click="goProfile(p)"
                 class="rounded-2xl p-5 cursor-pointer hover:opacity-90 active:scale-[0.99] transition shadow-md w-full"
                 :style="`background: ${p.color}`">
              <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-white/25 rounded-full flex items-center justify-center flex-shrink-0">
                  <span class="text-2xl font-bold text-white" x-text="p.initial"></span>
                </div>
                <div class="flex-1 min-w-0">
                  <p class="text-white font-bold text-lg" x-text="p.name"></p>
                  <p class="text-white/70 text-sm mt-0.5" x-text="p.age + '세 · ' + p.level"></p>
                  <div class="flex items-center gap-2 mt-2">
                    <span class="bg-white/20 text-white text-xs px-2.5 py-0.5 rounded-full" x-text="p.reading + '권 읽는 중'"></span>
                    <span class="bg-white/20 text-white text-xs px-2.5 py-0.5 rounded-full" x-text="p.done + '권 완독'"></span>
                  </div>
                </div>
                <svg class="w-5 h-5 text-white/50 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
              </div>
            </div>
          </template>

          <!-- 프로필 추가 -->
          <div class="rounded-2xl p-5 cursor-pointer border-2 border-dashed border-gray-200 hover:border-indigo-300 hover:bg-indigo-50 transition-colors flex items-center gap-4 w-full">
            <div class="w-14 h-14 bg-gray-100 rounded-full flex items-center justify-center flex-shrink-0">
              <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            </div>
            <p class="text-sm text-gray-400 font-medium">프로필 추가</p>
          </div>
        </div>
      </div>

      <!-- 즐겨찾는 프로필 탭 -->
      <div x-show="activeTab==='favorites'" x-cloak>
        <p class="text-sm text-gray-400 mb-4">즐겨찾는 프로필 목록</p>
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden divide-y divide-gray-100">
          <template x-for="(f, idx) in favorites" :key="f.id">
            <div class="flex items-center gap-3 px-4 py-3 cursor-pointer hover:bg-gray-50 active:bg-gray-100"
                 @click="goFavoriteProfile(f)">
              <!-- 프로필 사진 -->
              <div class="w-11 h-11 rounded-full flex items-center justify-center flex-shrink-0 text-white font-bold text-base"
                   :style="`background: ${f.color}`" x-text="f.initial"></div>
              <!-- 이름 -->
              <div class="flex-1 min-w-0">
                <p class="text-sm font-semibold text-gray-900 truncate" x-text="f.studentName"></p>
                <p class="text-xs text-gray-400 truncate" x-text="f.parentName"></p>
              </div>
              <!-- 나이 -->
              <span class="text-xs text-gray-500 flex-shrink-0" x-text="f.age + '세'"></span>
              <!-- 성별 -->
              <span class="text-xs flex-shrink-0"
                    :class="f.gender==='남' ? 'text-blue-400' : 'text-pink-400'"
                    x-text="f.gender"></span>
              <!-- 등급 (트로피) -->
              <div class="flex items-center gap-1 flex-shrink-0">
                <svg class="w-4 h-4" :class="trophyColor(f.grade)" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M5 3a1 1 0 000 2H3.5A1.5 1.5 0 002 6.5v1A3.5 3.5 0 005.5 11H6a4 4 0 003 3.874V16H7a1 1 0 100 2h6a1 1 0 100-2h-2v-1.126A4 4 0 0014 11h.5A3.5 3.5 0 0018 7.5v-1A1.5 1.5 0 0016.5 5H15a1 1 0 000-2H5zm9 2H6v4a2 2 0 104 0V5z" clip-rule="evenodd"/>
                </svg>
                <span class="text-xs font-medium" :class="trophyColor(f.grade)" x-text="f.grade"></span>
              </div>
              <!-- 삭제 버튼 -->
              <button @click.stop="removeFavorite(idx)"
                      class="flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center text-gray-300 hover:text-red-400 hover:bg-red-50 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>
          </template>
          <div x-show="favorites.length===0" class="px-4 py-10 text-center text-sm text-gray-400">즐겨찾는 프로필이 없습니다</div>
        </div>
      </div>

    </main>

    <!-- 하단 탭바 (lg 미만) -->
    <nav class="lg:hidden flex-shrink-0 bg-white border-t border-gray-100 flex">
      <a href="profiles.html" class="flex-1 flex flex-col items-center py-2 gap-0.5 text-indigo-600"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v1h8v-1zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-1a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v1h-3zM4.75 12.094A5.973 5.973 0 004 15v1H1v-1a3 3 0 013.75-2.906z"/></svg><span class="text-[10px] font-semibold">프로필</span></a>
      <a href="chat.html" class="flex-1 flex flex-col items-center py-2 gap-0.5 text-gray-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg><span class="text-[10px]">소통</span></a>
      <a href="bookstore.html" class="flex-1 flex flex-col items-center py-2 gap-0.5 text-gray-300"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg><span class="text-[10px]">서점</span></a>
      <a href="bookshelf.html" class="flex-1 flex flex-col items-center py-2 gap-0.5 text-gray-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg><span class="text-[10px]">내 책장</span></a>
      <a href="#" class="flex-1 flex flex-col items-center py-2 gap-0.5 text-gray-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg><span class="text-[10px]">내 정보</span></a>
    </nav>
  </div>
</div>
<script>
function app() {
  return {
    user: null, showMenu: false, activeTab: 'my',
    profiles: [
      { id:'hong', name:'홍길동', initial:'홍', age:9,  level:'Lv.3', reading:3, done:12, color:'linear-gradient(135deg,#667eea,#764ba2)' },
      { id:'chun', name:'성춘향', initial:'성', age:11, level:'Lv.4', reading:2, done:8,  color:'linear-gradient(135deg,#f093fb,#f5576c)' },
    ],
    favorites: [
      { id:'f1', studentName:'김민준', parentName:'김철수 부모님', initial:'김', age:10, gender:'남', grade:'골드', color:'linear-gradient(135deg,#43e97b,#38f9d7)' },
      { id:'f2', studentName:'이서연', parentName:'이영희 부모님', initial:'이', age:8,  gender:'여', grade:'실버', color:'linear-gradient(135deg,#fa709a,#fee140)' },
      { id:'f3', studentName:'박지호', parentName:'박민수 부모님', initial:'박', age:12, gender:'남', grade:'플래티넘', color:'linear-gradient(135deg,#4facfe,#00f2fe)' },
    ],
    init() {
      this.user = JSON.parse(localStorage.getItem('cr_user')||'null');
      if (!this.user || this.user.type !== 'parent') window.location.href = 'index.html';
    },
    logout() { localStorage.removeItem('cr_user'); window.location.href = 'index.html'; },
    goProfile(p) {
      localStorage.setItem('cr_profile', JSON.stringify(p));
      window.location.href = 'profile-detail.html';
    },
    removeFavorite(idx) {
      this.favorites.splice(idx, 1);
    },
    goFavoriteProfile(f) {
      const minjun = { id:'minjun', name:'김민준', initial:'김', age:10, grade:'초4', gender:'남', level:'Lv.3', gradeLabel:'골드', favorites:18, totalScore:3240, color:'linear-gradient(135deg,#43e97b,#38f9d7)' };
      localStorage.setItem('cr_profile', JSON.stringify(minjun));
      window.location.href = 'profile-detail.html';
    },
    trophyColor(grade) {
      if (grade === '플래티넘') return 'text-cyan-400';
      if (grade === '골드') return 'text-yellow-400';
      if (grade === '실버') return 'text-gray-400';
      return 'text-orange-400';
    }
  }
}
</script>
</body>
</html>
