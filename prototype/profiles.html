<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프로필 - CheckReading</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style> html,body{height:100%;} [x-cloak]{display:none!important;} </style>
</head>
<body class="bg-gray-200" style="height:100dvh;overflow:hidden;">
<div class="h-full flex items-stretch justify-center bg-gray-200" x-data="app()" x-init="init()">

  <!-- 사이드바 (lg+) -->
  <aside class="hidden lg:flex flex-col w-56 bg-white border-r border-gray-100 flex-shrink-0">
    <div class="px-5 py-5 border-b border-gray-100 flex items-center gap-3">
      <div class="w-8 h-8 bg-indigo-600 rounded-xl flex items-center justify-center"><span class="text-white text-xs font-bold">CR</span></div>
      <span class="font-bold text-gray-900">CheckReading</span>
    </div>
    <nav class="flex-1 py-4 px-3 flex flex-col gap-1">
      <a href="profiles.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-indigo-50 text-indigo-600 font-semibold text-sm"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v1h8v-1zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-1a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v1h-3zM4.75 12.094A5.973 5.973 0 004 15v1H1v-1a3 3 0 013.75-2.906z"/></svg>프로필</a>
      <a href="chat.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 hover:bg-gray-50 text-sm"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>소통</a>
      <a href="bookstore.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 hover:bg-gray-50 text-sm"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>서점</a>
      <a href="bookshelf.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 hover:bg-gray-50 text-sm"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>내 책장</a>
      <a href="myinfo.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 hover:bg-gray-50 text-sm"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>내 정보</a>
    </nav>
    <div class="px-4 py-4 border-t border-gray-100 flex items-center gap-3 relative">
      <button @click="showMenu=!showMenu" class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center text-xs font-bold text-indigo-600 flex-shrink-0" x-text="user?.initial||'?'"></button>
      <div class="flex-1 min-w-0"><p class="text-sm font-semibold text-gray-800 truncate" x-text="user?.name"></p><p class="text-xs text-gray-400">부모</p></div>
      <div x-show="showMenu" x-cloak @click.outside="showMenu=false" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100" class="absolute bottom-16 left-3 bg-white rounded-2xl shadow-xl border border-gray-100 w-44 overflow-hidden z-50">
        <button onclick="window.location.href='myinfo.html'" class="w-full px-4 py-3 text-sm text-left text-gray-700 hover:bg-gray-50 flex items-center gap-2"><svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>정보 보기</button>
        <button @click="logout()" class="w-full px-4 py-3 text-sm text-left text-red-500 hover:bg-red-50 flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>로그아웃</button>
      </div>
    </div>
  </aside>

  <!-- 메인 -->
  <div class="flex-1 flex flex-col min-w-0 bg-gray-50 max-w-3xl relative overflow-hidden">

    <header class="flex-shrink-0 bg-white border-b border-gray-100 px-4 py-3 flex items-center justify-between">
      <span class="font-bold text-gray-900">프로필</span>
      <div class="relative">
        <button @click="showMenu=!showMenu" class="lg:hidden w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center text-xs font-bold text-indigo-600" x-text="user?.initial||'?'"></button>
        <div x-show="showMenu" x-cloak @click.outside="showMenu=false" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100" class="lg:hidden absolute top-10 right-0 bg-white rounded-2xl shadow-xl border border-gray-100 w-44 overflow-hidden z-50">
          <div class="px-4 py-3 border-b border-gray-100"><p class="text-xs text-gray-400">부모</p><p class="text-sm font-semibold text-gray-800" x-text="user?.name"></p></div>
          <button onclick="window.location.href='myinfo.html'" class="w-full px-4 py-3 text-sm text-left text-gray-700 hover:bg-gray-50 flex items-center gap-2"><svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>정보 보기</button>
          <button @click="logout()" class="w-full px-4 py-3 text-sm text-left text-red-500 hover:bg-red-50 flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>로그아웃</button>
        </div>
      </div>
    </header>

    <!-- 탭바 -->
    <div class="flex-shrink-0 bg-white border-b border-gray-100 flex">
      <button @click="activeTab='my'"
              :class="activeTab==='my' ? 'border-b-2 border-indigo-600 text-indigo-600 font-semibold' : 'text-gray-400'"
              class="flex-1 py-3 text-sm transition-colors">나의 프로필</button>
      <button @click="activeTab='favorites'"
              :class="activeTab==='favorites' ? 'border-b-2 border-indigo-600 text-indigo-600 font-semibold' : 'text-gray-400'"
              class="flex-1 py-3 text-sm transition-colors">즐겨찾는 프로필</button>
    </div>

    <main class="flex-1 overflow-y-auto min-h-0 p-5">

      <!-- 나의 프로필 탭 -->
      <div x-show="activeTab==='my'">
        <p class="text-sm text-gray-400 mb-4">자녀 프로필을 선택하세요</p>
        <div class="flex flex-col gap-4 mb-4">
          <template x-for="p in profiles" :key="p.id">
            <div class="rounded-2xl overflow-hidden shadow-md w-full transition"
                 :class="p.today.eye.lost > 30 ? 'ring-2 ring-amber-400' : ''"
                 :style="`background: ${p.color}`">

              <!-- 프로필 헤더 (클릭 → 상세) -->
              <div @click="goProfile(p)" class="flex items-center gap-4 p-5 cursor-pointer hover:opacity-90 active:scale-[0.99] transition">
                <div class="relative flex-shrink-0">
                  <div class="w-14 h-14 bg-white/25 rounded-full flex items-center justify-center">
                    <span class="text-2xl font-bold text-white" x-text="p.initial"></span>
                  </div>
                  <div x-show="p.online" class="absolute bottom-0 right-0 w-4 h-4 bg-green-400 rounded-full border-2 border-white shadow"></div>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2">
                    <p class="text-white font-bold text-lg" x-text="p.name"></p>
                    <span x-show="p.online" x-cloak class="bg-green-400/30 text-green-100 text-[10px] px-2 py-0.5 rounded-full font-medium">● 읽는 중</span>
                  </div>
                  <p class="text-white/70 text-sm mt-0.5" x-text="p.age + '세 · ' + p.level"></p>
                  <div class="flex items-center gap-2 mt-2">
                    <span class="bg-white/20 text-white text-xs px-2.5 py-0.5 rounded-full" x-text="p.reading + '권 읽는 중'"></span>
                    <span class="bg-white/20 text-white text-xs px-2.5 py-0.5 rounded-full" x-text="p.done + '권 완독'"></span>
                  </div>
                </div>
                <svg class="w-5 h-5 text-white/50 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
              </div>

              <!-- 오늘 읽기 현황 -->
              <div class="px-5 pb-5">
                <div class="border-t border-white/20 pt-4">
                  <p class="text-white/50 text-[10px] font-semibold uppercase tracking-widest mb-3">오늘 읽기 현황</p>

                  <!-- 3개 스탯 -->
                  <div class="flex gap-2 mb-3">
                    <div class="flex-1 bg-white/15 rounded-xl px-2 py-2 text-center">
                      <p class="text-white font-bold text-lg leading-tight" x-text="p.today.score"></p>
                      <p class="text-white/55 text-[10px] mt-0.5">읽기점수</p>
                    </div>
                    <div class="flex-1 bg-white/15 rounded-xl px-2 py-2 text-center">
                      <p class="text-white font-bold text-lg leading-tight" x-text="p.today.time + '분'"></p>
                      <p class="text-white/55 text-[10px] mt-0.5" x-text="p.today.words.toLocaleString() + '단어'"></p>
                    </div>
                    <div class="flex-1 bg-white/15 rounded-xl px-2 py-2 text-center">
                      <p class="text-white font-bold text-lg leading-tight" :class="p.today.eye.lost > 30 ? 'text-amber-300' : ''" x-text="p.today.eye.lost + '%'"></p>
                      <p class="text-white/55 text-[10px] mt-0.5">Lost</p>
                    </div>
                  </div>

                  <!-- 시선 상태 바 -->
                  <div class="bg-white/10 rounded-xl p-3">
                    <div class="flex rounded-full overflow-hidden h-2.5 mb-2.5">
                      <div class="bg-emerald-400 transition-all duration-700" :style="`width:${p.today.eye.reading}%`"></div>
                      <div class="bg-amber-400 transition-all duration-700" :style="`width:${p.today.eye.scanning}%`"></div>
                      <div class="transition-all duration-700" :class="p.today.eye.lost > 30 ? 'bg-red-500' : 'bg-red-400'" :style="`width:${p.today.eye.lost}%`"></div>
                    </div>
                    <div class="flex justify-between text-[10px]">
                      <span class="text-emerald-300 font-medium">● Reading <span x-text="p.today.eye.reading + '%'"></span></span>
                      <span class="text-amber-300 font-medium">● Scanning <span x-text="p.today.eye.scanning + '%'"></span></span>
                      <span class="font-medium" :class="p.today.eye.lost > 30 ? 'text-red-300 font-bold' : 'text-red-300'">● Lost <span x-text="p.today.eye.lost + '%'"></span></span>
                    </div>
                  </div>

                  <!-- 온라인 버튼 2개 (온라인일 때만) -->
                  <div x-show="p.online" x-cloak class="mt-3 flex gap-2">
                    <button @click.stop="openViewer(p)"
                            class="flex-1 py-2.5 bg-white text-sm font-bold rounded-xl flex items-center justify-center gap-1.5 shadow"
                            :style="`color:${p.accent}`">
                      <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                      같이 보기
                    </button>
                    <button @click.stop="openCamera(p)"
                            class="flex-1 py-2.5 bg-white/20 text-white text-sm font-bold rounded-xl flex items-center justify-center gap-1.5 border border-white/30">
                      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.723v6.554a1 1 0 01-1.447.894L15 14M4 6h8a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V8a2 2 0 012-2z"/></svg>
                      얼굴 보기
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </template>

          <!-- 프로필 추가 -->
          <div @click="openAdd()" class="rounded-2xl p-5 cursor-pointer border-2 border-dashed border-gray-200 hover:border-indigo-300 hover:bg-indigo-50 transition-colors flex items-center gap-4 w-full">
            <div class="w-14 h-14 bg-gray-100 rounded-full flex items-center justify-center flex-shrink-0">
              <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            </div>
            <p class="text-sm text-gray-400 font-medium">프로필 추가</p>
          </div>
        </div>
      </div>

      <!-- 즐겨찾는 프로필 탭 -->
      <div x-show="activeTab==='favorites'" x-cloak>
        <p class="text-sm text-gray-400 mb-4">즐겨찾는 프로필 목록</p>
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden divide-y divide-gray-100">
          <template x-for="(f, idx) in favorites" :key="f.id">
            <div class="flex items-center gap-3 px-4 py-3 cursor-pointer hover:bg-gray-50 active:bg-gray-100"
                 @click="goFavoriteProfile(f)">
              <!-- 프로필 사진 -->
              <div class="w-11 h-11 rounded-full flex items-center justify-center flex-shrink-0 text-white font-bold text-base"
                   :style="`background: ${f.color}`" x-text="f.initial"></div>
              <!-- 이름 -->
              <div class="flex-1 min-w-0">
                <p class="text-sm font-semibold text-gray-900 truncate" x-text="f.studentName"></p>
                <p class="text-xs text-gray-400 truncate" x-text="f.parentName"></p>
              </div>
              <!-- 나이 -->
              <span class="text-xs text-gray-500 flex-shrink-0" x-text="f.age + '세'"></span>
              <!-- 성별 -->
              <span class="text-xs flex-shrink-0"
                    :class="f.gender==='남' ? 'text-blue-400' : 'text-pink-400'"
                    x-text="f.gender"></span>
              <!-- 등급 (트로피) -->
              <div class="flex items-center gap-1 flex-shrink-0">
                <svg class="w-4 h-4" :class="trophyColor(f.grade)" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M5 3a1 1 0 000 2H3.5A1.5 1.5 0 002 6.5v1A3.5 3.5 0 005.5 11H6a4 4 0 003 3.874V16H7a1 1 0 100 2h6a1 1 0 100-2h-2v-1.126A4 4 0 0014 11h.5A3.5 3.5 0 0018 7.5v-1A1.5 1.5 0 0016.5 5H15a1 1 0 000-2H5zm9 2H6v4a2 2 0 104 0V5z" clip-rule="evenodd"/>
                </svg>
                <span class="text-xs font-medium" :class="trophyColor(f.grade)" x-text="f.grade"></span>
              </div>
              <!-- 삭제 버튼 -->
              <button @click.stop="removeFavorite(idx)"
                      class="flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center text-gray-300 hover:text-red-400 hover:bg-red-50 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>
          </template>
          <div x-show="favorites.length===0" class="px-4 py-10 text-center text-sm text-gray-400">즐겨찾는 프로필이 없습니다</div>
        </div>
      </div>

    </main>

    <!-- ===== 프로필 추가 위자드 패널 ===== -->
    <div x-show="addPanel" x-cloak
         class="absolute inset-0 bg-white z-30 flex flex-col"
         x-transition:enter="transition ease-out duration-300" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0"
         x-transition:leave="transition ease-in duration-200" x-transition:leave-start="translate-x-0" x-transition:leave-end="translate-x-full">

      <!-- 헤더 -->
      <div class="flex-shrink-0 flex items-center gap-3 px-4 py-3 border-b border-gray-100">
        <button @click="addStep>1 ? addStep-- : (addPanel=false)"
                class="w-8 h-8 flex items-center justify-center text-gray-500 hover:bg-gray-100 rounded-full">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <span class="font-bold text-gray-900 flex-1">프로필 추가</span>
        <span class="text-xs text-gray-400" x-text="addStep + ' / 6'"></span>
      </div>

      <!-- 진행 바 -->
      <div class="flex-shrink-0 h-1 bg-gray-100">
        <div class="h-full bg-indigo-500 transition-all duration-300" :style="`width:${addStep/6*100}%`"></div>
      </div>

      <!-- 스텝 콘텐츠 -->
      <div class="flex-1 overflow-y-auto min-h-0 px-5 py-6">

        <!-- Step 1: 사진 (색상) -->
        <div x-show="addStep===1">
          <h2 class="text-lg font-bold text-gray-900 mb-1">프로필 사진</h2>
          <p class="text-sm text-gray-400 mb-6">배경 색상을 선택하세요</p>
          <!-- 미리보기 -->
          <div class="flex justify-center mb-6">
            <div class="w-24 h-24 rounded-full flex items-center justify-center text-4xl font-bold text-white shadow-lg transition-all"
                 :style="`background:${newP.color}`"
                 x-text="newP.name ? newP.name[0] : '?'"></div>
          </div>
          <div class="grid grid-cols-4 gap-3">
            <template x-for="c in addColors" :key="c">
              <button @click="newP.color=c"
                      class="aspect-square rounded-2xl shadow-sm transition-transform hover:scale-105"
                      :style="`background:${c}`"
                      :class="newP.color===c ? 'ring-4 ring-indigo-400 ring-offset-2 scale-105' : ''"></button>
            </template>
          </div>
        </div>

        <!-- Step 2: 닉네임 -->
        <div x-show="addStep===2">
          <h2 class="text-lg font-bold text-gray-900 mb-1">닉네임</h2>
          <p class="text-sm text-gray-400 mb-6">자녀의 닉네임을 입력하세요</p>
          <div class="flex justify-center mb-6">
            <div class="w-20 h-20 rounded-full flex items-center justify-center text-3xl font-bold text-white shadow-lg"
                 :style="`background:${newP.color}`"
                 x-text="newP.name ? newP.name[0] : '?'"></div>
          </div>
          <input x-model="newP.name" type="text" maxlength="10"
                 class="w-full border-2 border-gray-200 rounded-xl px-4 py-3.5 text-base focus:outline-none focus:border-indigo-400 transition-colors"
                 placeholder="닉네임 입력 (2~10자)">
          <p class="text-xs text-gray-400 mt-2">한글/영문/숫자 사용 가능</p>
        </div>

        <!-- Step 3: 생년 -->
        <div x-show="addStep===3">
          <h2 class="text-lg font-bold text-gray-900 mb-1">생년</h2>
          <p class="text-sm text-gray-400 mb-6">태어난 연도를 선택하세요</p>
          <div class="grid grid-cols-3 gap-2">
            <template x-for="y in addYears" :key="y">
              <button @click="newP.birthYear=y"
                      class="py-3 rounded-xl text-sm font-medium border-2 transition-colors"
                      :class="newP.birthYear===y ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-gray-700 border-gray-200 hover:border-indigo-300'"
                      x-text="y + '년'"></button>
            </template>
          </div>
        </div>

        <!-- Step 4: 학년 -->
        <div x-show="addStep===4">
          <h2 class="text-lg font-bold text-gray-900 mb-1">학년</h2>
          <p class="text-sm text-gray-400 mb-6">현재 학년을 선택하세요</p>
          <div class="grid grid-cols-3 gap-2">
            <template x-for="g in addGrades" :key="g">
              <button @click="newP.grade=g"
                      class="py-3.5 rounded-xl text-sm font-medium border-2 transition-colors"
                      :class="newP.grade===g ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-gray-700 border-gray-200 hover:border-indigo-300'"
                      x-text="g"></button>
            </template>
          </div>
        </div>

        <!-- Step 5: 성별 -->
        <div x-show="addStep===5">
          <h2 class="text-lg font-bold text-gray-900 mb-1">성별</h2>
          <p class="text-sm text-gray-400 mb-6">성별을 선택하세요</p>
          <div class="flex gap-4">
            <button @click="newP.gender='남'"
                    class="flex-1 py-8 rounded-2xl text-5xl border-2 transition-colors flex flex-col items-center gap-3"
                    :class="newP.gender==='남' ? 'bg-blue-50 border-blue-400' : 'bg-white border-gray-200 hover:border-blue-200'">
              👦<span class="text-base font-semibold" :class="newP.gender==='남' ? 'text-blue-600' : 'text-gray-400'">남자</span>
            </button>
            <button @click="newP.gender='여'"
                    class="flex-1 py-8 rounded-2xl text-5xl border-2 transition-colors flex flex-col items-center gap-3"
                    :class="newP.gender==='여' ? 'bg-pink-50 border-pink-400' : 'bg-white border-gray-200 hover:border-pink-200'">
              👧<span class="text-base font-semibold" :class="newP.gender==='여' ? 'text-pink-600' : 'text-gray-400'">여자</span>
            </button>
          </div>
        </div>

        <!-- Step 6: 선호 장르 -->
        <div x-show="addStep===6">
          <h2 class="text-lg font-bold text-gray-900 mb-1">선호 장르</h2>
          <p class="text-sm text-gray-400 mb-6">좋아하는 장르를 선택하세요 (복수 선택)</p>
          <div class="flex flex-wrap gap-2">
            <template x-for="g in addGenres" :key="g.id">
              <button @click="g.on=!g.on"
                      class="px-4 py-2.5 rounded-full text-sm font-medium border-2 transition-colors"
                      :class="g.on ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-gray-600 border-gray-200 hover:border-indigo-300'"
                      x-text="g.label"></button>
            </template>
          </div>
        </div>

      </div>

      <!-- 하단 버튼 -->
      <div class="flex-shrink-0 px-5 py-4 border-t border-gray-100 bg-white">
        <button @click="addNext()"
                class="w-full py-3.5 rounded-xl text-sm font-bold transition-colors"
                :class="canNext() ? 'bg-indigo-600 text-white hover:bg-indigo-700' : 'bg-gray-100 text-gray-400 cursor-not-allowed'"
                :disabled="!canNext()"
                x-text="addStep===6 ? '완료' : '다음'"></button>
      </div>
    </div>

    <!-- 하단 탭바 (lg 미만) -->
    <nav class="lg:hidden flex-shrink-0 bg-white border-t border-gray-100 flex">
      <a href="profiles.html" class="flex-1 flex flex-col items-center py-2 gap-0.5 text-indigo-600"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v1h8v-1zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-1a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v1h-3zM4.75 12.094A5.973 5.973 0 004 15v1H1v-1a3 3 0 013.75-2.906z"/></svg><span class="text-[10px] font-semibold">프로필</span></a>
      <a href="chat.html" class="flex-1 flex flex-col items-center py-2 gap-0.5 text-gray-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg><span class="text-[10px]">소통</span></a>
      <a href="bookstore.html" class="flex-1 flex flex-col items-center py-2 gap-0.5 text-gray-300"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg><span class="text-[10px]">서점</span></a>
      <a href="bookshelf.html" class="flex-1 flex flex-col items-center py-2 gap-0.5 text-gray-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg><span class="text-[10px]">내 책장</span></a>
      <a href="myinfo.html" class="flex-1 flex flex-col items-center py-2 gap-0.5 text-gray-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg><span class="text-[10px]">내 정보</span></a>
    </nav>
  </div>
</div>
<script>
function app() {
  const C = ['linear-gradient(135deg,#667eea,#764ba2)','linear-gradient(135deg,#f093fb,#f5576c)','linear-gradient(135deg,#4facfe,#00f2fe)','linear-gradient(135deg,#43e97b,#38f9d7)','linear-gradient(135deg,#fa709a,#fee140)','linear-gradient(135deg,#a18cd1,#fbc2eb)','linear-gradient(135deg,#fd7043,#ff8a65)','linear-gradient(135deg,#26c6da,#00838f)'];
  return {
    user: null, showMenu: false, activeTab: 'my',
    addPanel: false, addStep: 1,
    newP: { color:'', name:'', birthYear:2016, grade:'', gender:'' },
    profiles: [
      { id:'hong', name:'홍길동', initial:'홍', age:9,  level:'Lv.3', reading:3, done:12,
        color:'linear-gradient(135deg,#667eea,#764ba2)', accent:'#667eea',
        online: true,
        today: { score:124, time:42, words:1840, eye:{ reading:65, scanning:22, lost:13 } } },
      { id:'chun', name:'성춘향', initial:'성', age:11, level:'Lv.4', reading:2, done:8,
        color:'linear-gradient(135deg,#f093fb,#f5576c)', accent:'#f093fb',
        online: false,
        today: { score:87, time:28, words:1120, eye:{ reading:72, scanning:20, lost:8 } } },
    ],
    favorites: [
      { id:'f1', studentName:'김민준', parentName:'김철수 부모님', initial:'김', age:10, gender:'남', grade:'골드', color:'linear-gradient(135deg,#43e97b,#38f9d7)' },
      { id:'f2', studentName:'이서연', parentName:'이영희 부모님', initial:'이', age:8,  gender:'여', grade:'실버', color:'linear-gradient(135deg,#fa709a,#fee140)' },
      { id:'f3', studentName:'박지호', parentName:'박민수 부모님', initial:'박', age:12, gender:'남', grade:'플래티넘', color:'linear-gradient(135deg,#4facfe,#00f2fe)' },
    ],
    init() {
      this.user = JSON.parse(localStorage.getItem('cr_user')||'null');
      if (!this.user || this.user.type !== 'parent') window.location.href = 'index.html';
      // 실시간 시뮬레이션: 온라인 프로필 1초마다 지표 변동
      setInterval(() => {
        this.profiles.forEach(p => {
          if (!p.online) return;
          if (Math.random() < 0.35) p.today.score += 1;
          p.today.words += Math.floor(Math.random() * 6);
          if (Math.random() < 0.12) p.today.time += 1;
          const d = Math.floor(Math.random() * 5) - 2;
          p.today.eye.reading = Math.min(88, Math.max(20, p.today.eye.reading + d));
          const d2 = Math.floor(Math.random() * 3) - 1;
          p.today.eye.scanning = Math.min(45, Math.max(5, p.today.eye.scanning + d2));
          p.today.eye.lost = 100 - p.today.eye.reading - p.today.eye.scanning;
        });
      }, 1000);
    },
    logout() { localStorage.removeItem('cr_user'); window.location.href = 'index.html'; },
    goProfile(p) {
      localStorage.setItem('cr_profile', JSON.stringify(p));
      window.location.href = 'profile-detail.html';
    },
    openViewer(p) {
      localStorage.setItem('cr_profile', JSON.stringify(p));
      window.location.href = 'reader.html';
    },
    openCamera(p) {
      localStorage.setItem('cr_profile', JSON.stringify(p));
      window.location.href = 'camera.html';
    },
    removeFavorite(idx) {
      this.favorites.splice(idx, 1);
    },
    goFavoriteProfile(f) {
      const minjun = { id:'minjun', name:'김민준', initial:'김', age:10, grade:'초4', gender:'남', level:'Lv.3', gradeLabel:'골드', favorites:18, totalScore:3240, color:'linear-gradient(135deg,#43e97b,#38f9d7)', isOther:true };
      localStorage.setItem('cr_profile', JSON.stringify(minjun));
      window.location.href = 'profile-detail.html';
    },
    addColors: ['linear-gradient(135deg,#667eea,#764ba2)','linear-gradient(135deg,#f093fb,#f5576c)','linear-gradient(135deg,#4facfe,#00f2fe)','linear-gradient(135deg,#43e97b,#38f9d7)','linear-gradient(135deg,#fa709a,#fee140)','linear-gradient(135deg,#a18cd1,#fbc2eb)','linear-gradient(135deg,#fd7043,#ff8a65)','linear-gradient(135deg,#26c6da,#00838f)'],
    addYears: Array.from({length:15},(_,i)=>2024-i),
    addGrades: ['초1','초2','초3','초4','초5','초6','중1','중2','중3'],
    addGenres: [
      {id:1,label:'📚 모험',on:false},{id:2,label:'🔬 과학',on:false},
      {id:3,label:'🏰 판타지',on:false},{id:4,label:'🌍 역사',on:false},
      {id:5,label:'😂 유머',on:false},{id:6,label:'🔎 미스터리',on:false},
      {id:7,label:'🐾 동물',on:false},{id:8,label:'🚀 SF',on:false},
      {id:9,label:'💪 스포츠',on:false},{id:10,label:'🎨 예술',on:false},
    ],
    openAdd() {
      this.addStep = 1;
      this.newP = { color: C[0], name:'', birthYear:2016, grade:'', gender:'' };
      this.addGenres.forEach(g => g.on = false);
      this.addPanel = true;
    },
    canNext() {
      if (this.addStep===1) return !!this.newP.color;
      if (this.addStep===2) return this.newP.name.trim().length >= 2;
      if (this.addStep===3) return !!this.newP.birthYear;
      if (this.addStep===4) return !!this.newP.grade;
      if (this.addStep===5) return !!this.newP.gender;
      return true;
    },
    addNext() {
      if (!this.canNext()) return;
      if (this.addStep < 6) { this.addStep++; return; }
      const newId = 'p' + Date.now();
      const name = this.newP.name.trim();
      this.profiles.push({
        id: newId, name, initial: name[0],
        age: new Date().getFullYear() - this.newP.birthYear,
        level: 'Lv.1', reading: 0, done: 0,
        color: this.newP.color
      });
      this.addPanel = false;
    },
    trophyColor(grade) {
      if (grade === '플래티넘') return 'text-cyan-400';
      if (grade === '골드') return 'text-yellow-400';
      if (grade === '실버') return 'text-gray-400';
      return 'text-orange-400';
    }
  }
}
</script>
</body>
