<script>
/* ── 드래그 캐러셀 (단일 전역 핸들러) ── */
function initCarousels() {
  let el = null, startX = 0, scrollStart = 0;
  let velX = 0, prevX = 0, prevT = 0, raf = null, moved = false;

  document.querySelectorAll('.carousel').forEach(carousel => {
    carousel.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      cancelAnimationFrame(raf);
      el = carousel;
      startX = e.clientX;
      scrollStart = carousel.scrollLeft;
      prevX = e.clientX; prevT = Date.now();
      velX = 0; moved = false;
      e.preventDefault();
    });
    // 드래그 중 자식 click 차단
    carousel.addEventListener('click', e => {
      if (moved) { e.stopPropagation(); e.preventDefault(); }
    }, true);
  });

  document.addEventListener('mousemove', e => {
    if (!el) return;
    const dx = e.clientX - startX;
    if (Math.abs(dx) > 4) { el.classList.add('grabbing'); moved = true; }
    el.scrollLeft = scrollStart - dx;
    const now = Date.now(), dt = Math.max(now - prevT, 1);
    velX = (prevX - e.clientX) / dt * 15;
    prevX = e.clientX; prevT = now;
  });

  document.addEventListener('mouseup', () => {
    if (!el) return;
    const target = el;
    el.classList.remove('grabbing');
    el = null;
    // 모멘텀
    const glide = () => {
      if (Math.abs(velX) < 0.3) return;
      target.scrollLeft += velX;
      velX *= 0.90;
      raf = requestAnimationFrame(glide);
    };
    glide();
  });
}

/* ── 앱 데이터 ── */
function app() {
  const C = ['linear-gradient(135deg,#667eea,#764ba2)','linear-gradient(135deg,#f093fb,#f5576c)','linear-gradient(135deg,#4facfe,#00f2fe)','linear-gradient(135deg,#43e97b,#38f9d7)','linear-gradient(135deg,#fa709a,#fee140)','linear-gradient(135deg,#a18cd1,#fbc2eb)','linear-gradient(135deg,#fccb90,#d57eeb)','linear-gradient(135deg,#a1c4fd,#c2e9fb)','linear-gradient(135deg,#fd7043,#ff8a65)','linear-gradient(135deg,#26c6da,#00838f)','linear-gradient(135deg,#66bb6a,#2e7d32)','linear-gradient(135deg,#ec407a,#880e4f)'];
  const mk = (l) => l.map((b,i) => ({id:i,...b,color:C[i%C.length]}));
  return {
    user: null, isParent: false, showMenu: false,
    selectedShelf: null, selectedBook: null,

    init() {
      this.user = JSON.parse(localStorage.getItem('cr_user')||'null');
      if (!this.user) { window.location.href = 'index.html'; return; }
      this.isParent = this.user.type === 'parent';
      this.$nextTick(() => initCarousels());
    },
