<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서점 - CheckReading</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="CheckReading">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#1d4ed8">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    html,body{height:100%;}
    [x-cloak]{display:none!important;}
    .carousel{overflow-x:auto;cursor:grab;-webkit-user-select:none;user-select:none;}
    .carousel.grabbing{cursor:grabbing;}
    .carousel::-webkit-scrollbar{display:none;}
    .carousel{-ms-overflow-style:none;scrollbar-width:none;}
  </style>
</head>
<body class="bg-gray-200" style="height:100dvh;overflow:hidden;">
<div class="h-full flex items-stretch justify-center bg-gray-200" x-data="app()" x-init="init()">

  <!-- 사이드바 (lg+) -->
  <aside class="hidden lg:flex flex-col w-56 bg-white border-r border-gray-100 flex-shrink-0">
    <div class="px-5 py-5 border-b border-gray-100 flex items-center gap-3">
      <span class="font-bold text-gray-900">CheckReading</span>
    </div>
    <nav class="flex-1 py-4 px-3 flex flex-col gap-1">
      <a x-show="isParent" href="profiles.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 hover:bg-gray-50 text-sm"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v1h8v-1zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-1a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v1h-3zM4.75 12.094A5.973 5.973 0 004 15v1H1v-1a3 3 0 013.75-2.906z"/></svg>프로필</a>
      <a href="chat.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 hover:bg-gray-50 text-sm"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>소통</a>
      <a href="bookstore.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-blue-50 text-blue-700 font-semibold text-sm"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>서점</a>
      <a href="bookshelf.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 hover:bg-gray-50 text-sm"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>내 책장</a>
      <a href="myinfo.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 hover:bg-gray-50 text-sm"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>내 정보</a>
    </nav>
    <div class="px-4 py-4 border-t border-gray-100 flex items-center gap-3 relative">
      <button @click="showMenu=!showMenu" class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-xs font-bold text-blue-700 flex-shrink-0" x-text="user?.initial||'?'"></button>
      <div class="flex-1 min-w-0"><p class="text-sm font-semibold text-gray-800 truncate" x-text="user?.name"></p><p class="text-xs text-gray-400" x-text="isParent?'부모':'학생'"></p></div>
      <div x-show="showMenu" x-cloak @click.outside="showMenu=false" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100" class="absolute bottom-16 left-3 bg-white rounded-2xl shadow-xl border border-gray-100 w-44 overflow-hidden z-50">
        <button onclick="window.location.href='myinfo.html'" class="w-full px-4 py-3 text-sm text-left text-gray-700 hover:bg-gray-50 flex items-center gap-2"><svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>정보 보기</button>
        <button @click="logout()" class="w-full px-4 py-3 text-sm text-left text-red-500 hover:bg-red-50 flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>로그아웃</button>
      </div>
    </div>
  </aside>

  <!-- 메인 -->
  <div class="flex-1 flex flex-col min-w-0 bg-gray-50 max-w-3xl relative overflow-hidden"
       @open-book.window="openBook($event.detail)">
    <header class="flex-shrink-0 bg-white border-b border-gray-100 px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="font-bold text-gray-900">서점</span>
      </div>
      <div class="flex items-center gap-2 relative">
        <button @click="searchPanel=true" class="flex items-center gap-1 px-2.5 py-1.5 text-gray-500 hover:text-blue-700 hover:bg-blue-50 rounded-xl transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <span class="text-xs font-semibold">탐색</span>
        </button>
        <button @click="showMenu=!showMenu" class="lg:hidden w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-xs font-bold text-blue-700" x-text="user?.initial||'?'"></button>
        <div x-show="showMenu" x-cloak @click.outside="showMenu=false" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100" class="lg:hidden absolute top-10 right-0 bg-white rounded-2xl shadow-xl border border-gray-100 w-44 overflow-hidden z-50">
          <div class="px-4 py-3 border-b border-gray-100"><p class="text-xs text-gray-400" x-text="isParent?'부모':'학생'"></p><p class="text-sm font-semibold text-gray-800" x-text="user?.name"></p></div>
          <button onclick="window.location.href='myinfo.html'" class="w-full px-4 py-3 text-sm text-left text-gray-700 hover:bg-gray-50 flex items-center gap-2"><svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>정보 보기</button>
          <button @click="logout()" class="w-full px-4 py-3 text-sm text-left text-red-500 hover:bg-red-50 flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>로그아웃</button>
        </div>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto min-h-0">
      <!-- 이번 주 Pick 슬라이더 -->
      <div class="mt-4 relative" x-data="pickSlider()">
        <div class="overflow-hidden mx-4 rounded-2xl"
             @touchstart.passive="touchStartX=$event.touches[0].clientX"
             @touchend.passive="onSwipe($event)">
          <div class="flex transition-transform duration-500 ease-in-out"
               :style="`transform:translateX(-${current*100}%)`">
            <template x-for="(p, idx) in picks" :key="idx">
              <div class="min-w-full rounded-2xl px-5 py-6 cursor-pointer flex items-center gap-4"
                   :style="`background:${p.color}`"
                   @click="$dispatch('open-book', p)">
                <div class="flex-1 min-w-0">
                  <p class="text-white/70 text-xs font-medium mb-1" x-text="p.label"></p>
                  <h2 class="text-white text-lg font-bold leading-snug" x-text="p.title"></h2>
                  <p class="text-white/70 text-xs mt-1" x-text="p.author + ' · ' + p.level"></p>
                  <button class="mt-3 bg-white/90 text-gray-800 text-xs font-semibold px-4 py-1.5 rounded-full">읽어보기</button>
                </div>
                <div class="w-20 h-28 rounded-xl flex-shrink-0 flex items-end p-2 shadow-lg bg-white/20">
                  <span class="text-white text-[10px] font-bold leading-tight drop-shadow" x-text="p.title"></span>
                </div>
              </div>
            </template>
          </div>
        </div>
        <!-- 도트 -->
        <div class="flex justify-center gap-1.5 mt-2">
          <template x-for="(p, idx) in picks" :key="idx">
            <button @click="current=idx; resetTimer()"
                    class="rounded-full transition-all duration-300"
                    :class="current===idx ? 'w-4 h-1.5 bg-blue-500' : 'w-1.5 h-1.5 bg-gray-300'"></button>
          </template>
        </div>
      </div>

      <template x-for="shelf in shelves" :key="shelf.id">
        <div>
          <!-- 선반 -->
          <div x-show="shelf.type!=='section'" class="mt-5">
            <div class="flex items-center justify-between px-4 mb-3">
              <template x-if="shelf.profile">
                <div class="flex items-center gap-2">
                  <div class="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0 shadow-sm" :style="`background:${shelf.profile.color}`" x-text="shelf.profile.initial"></div>
                  <h3 class="font-bold text-gray-800 text-sm" x-text="shelf.title"></h3>
                </div>
              </template>
              <template x-if="!shelf.profile">
                <h3 class="font-bold text-gray-800 text-sm" x-text="shelf.title"></h3>
              </template>
              <button @click="openShelf(shelf)" class="text-xs text-blue-600 font-medium flex items-center gap-0.5">전체<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button>
            </div>
            <div class="carousel flex gap-3 px-4 pb-2">
              <template x-for="book in shelf.books" :key="book.id">
                <div class="flex-none w-[88px] md:w-[104px] lg:w-[120px]" @click="openBook(book)">
                  <div class="relative w-full h-[120px] md:h-[140px] lg:h-[160px] rounded-xl mb-1.5 flex items-end p-2.5 shadow-sm" :style="`background:${book.color}`">
                    <span class="text-white text-[10px] font-bold leading-tight drop-shadow" x-text="book.title"></span>
                    <div x-show="book.likedBy && book.likedBy.length" class="absolute top-1.5 right-1.5 flex flex-col gap-0.5">
                      <template x-for="pid in (book.likedBy||[])" :key="pid">
                        <div class="w-4 h-4 rounded-full flex items-center justify-center shadow" :style="`background:${profileColors[pid]||'#aaa'}`">
                          <svg class="w-2.5 h-2.5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        </div>
                      </template>
                    </div>
                  </div>
                  <p class="text-[11px] text-gray-700 font-medium leading-tight truncate" x-text="book.title"></p>
                  <p class="text-[10px] text-gray-400 truncate" x-text="book.author"></p>
                  <span class="inline-block text-[10px] bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded-md mt-0.5" x-text="book.level"></span>
                </div>
              </template>
            </div>
          </div>
        </div>
      </template>
      <div class="h-4"></div>
    </main>

    <!-- 탐색 패널 -->
    <div x-show="searchPanel" x-cloak
         x-transition:enter="transition ease-out duration-300 transform" x-transition:enter-start="translate-y-full" x-transition:enter-end="translate-y-0"
         x-transition:leave="transition ease-in duration-200 transform" x-transition:leave-start="translate-y-0" x-transition:leave-end="translate-y-full"
         class="absolute inset-0 bg-gray-50 z-[15] flex flex-col">

      <!-- 헤더 -->
      <div class="flex-shrink-0 bg-white border-b border-gray-100 px-4 py-3 flex items-center gap-3">
        <button @click="closeSearch()" class="w-8 h-8 flex items-center justify-center text-gray-500 hover:bg-gray-100 rounded-full">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <span class="font-bold text-gray-900">책 찾기</span>
      </div>

      <!-- 검색창 -->
      <div class="flex-shrink-0 bg-white px-4 py-3 border-b border-gray-100">
        <div class="flex items-center gap-2 bg-gray-100 rounded-xl px-3 py-2.5">
          <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input x-model="searchQuery" type="text" placeholder="제목, 작가 검색..."
                 class="flex-1 bg-transparent text-sm outline-none placeholder-gray-400" autocomplete="off">
          <button x-show="searchQuery" @click="searchQuery=''" class="w-5 h-5 flex items-center justify-center text-gray-400 hover:text-gray-600 flex-shrink-0">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
      </div>

      <!-- 콘텐츠: 검색 결과 OR 장르 선반 -->
      <div class="flex-1 overflow-y-auto min-h-0">

        <!-- 검색 결과 -->
        <template x-if="searchQuery.trim()">
          <div class="p-4">
            <p class="text-xs text-gray-500 mb-3"
               x-text="'&quot;' + searchQuery + '&quot; 검색 결과 ' + searchResults.length + '권'"></p>
            <template x-if="searchResults.length > 0">
              <div class="grid grid-cols-3 md:grid-cols-4 gap-3">
                <template x-for="book in searchResults" :key="book.id">
                  <div class="cursor-pointer" @click="openBook(book)">
                    <div class="w-full aspect-[3/4] rounded-xl mb-1.5 flex items-end p-2 shadow-sm" :style="`background:${book.color}`">
                      <span class="text-white text-[10px] font-bold leading-tight drop-shadow" x-text="book.title"></span>
                    </div>
                    <p class="text-[11px] text-gray-700 font-medium leading-tight truncate" x-text="book.title"></p>
                    <p class="text-[10px] text-gray-400 truncate" x-text="book.author"></p>
                    <span class="inline-block text-[10px] bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded-md mt-0.5" x-text="book.level"></span>
                  </div>
                </template>
              </div>
            </template>
            <template x-if="searchResults.length === 0">
              <div class="text-center py-16">
                <p class="text-3xl mb-3">📚</p>
                <p class="text-sm text-gray-500">검색 결과가 없어요</p>
                <p class="text-xs text-gray-400 mt-1">다른 제목이나 작가명으로 검색해 보세요</p>
              </div>
            </template>
          </div>
        </template>

        <!-- 장르별 선반 -->
        <template x-if="!searchQuery.trim()">
          <div>
            <template x-for="genre in genres" :key="genre.id">
              <div class="mt-5">
                <div class="flex items-center justify-between px-4 mb-3">
                  <h3 class="font-bold text-gray-800 text-sm" x-text="genre.label"></h3>
                  <button @click="openShelf(genre)" class="text-xs text-blue-600 font-medium flex items-center gap-0.5">전체<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button>
                </div>
                <div class="carousel flex gap-3 px-4 pb-2">
                  <template x-for="book in genre.books" :key="book.id">
                    <div class="flex-none w-[88px] md:w-[104px]" @click="openBook(book)">
                      <div class="relative w-full h-[120px] md:h-[140px] rounded-xl mb-1.5 flex items-end p-2.5 shadow-sm cursor-pointer" :style="`background:${book.color}`">
                        <span class="text-white text-[10px] font-bold leading-tight drop-shadow" x-text="book.title"></span>
                      </div>
                      <p class="text-[11px] text-gray-700 font-medium leading-tight truncate" x-text="book.title"></p>
                      <p class="text-[10px] text-gray-400 truncate" x-text="book.author"></p>
                      <span class="inline-block text-[10px] bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded-md mt-0.5" x-text="book.level"></span>
                    </div>
                  </template>
                </div>
              </div>
            </template>
            <div class="h-6"></div>
          </div>
        </template>

      </div>
    </div>

    <!-- 전체보기 패널 -->
    <div x-show="selectedShelf" x-cloak
         x-transition:enter="transition ease-out duration-300 transform" x-transition:enter-start="translate-y-full" x-transition:enter-end="translate-y-0"
         x-transition:leave="transition ease-in duration-200 transform" x-transition:leave-start="translate-y-0" x-transition:leave-end="translate-y-full"
         class="absolute inset-0 bg-white z-20 flex flex-col">
      <div class="flex-shrink-0 flex items-center gap-3 px-4 py-3 border-b border-gray-100">
        <button @click="selectedShelf=null" class="w-8 h-8 flex items-center justify-center text-gray-500 hover:bg-gray-100 rounded-full"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>
        <h2 class="font-bold text-gray-900 text-sm flex-1 truncate" x-text="selectedShelf?.title || selectedShelf?.label"></h2>
        <span class="text-xs text-gray-400" x-text="(selectedShelf?.books?.length||0)+'권'"></span>
      </div>
      <div class="flex-1 overflow-y-auto min-h-0 p-4">
        <div class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
          <template x-for="book in selectedShelf?.books" :key="book.id">
            <div class="cursor-pointer" @click="openBook(book); selectedShelf=null">
              <div class="w-full aspect-[3/4] rounded-xl mb-1.5 flex items-end p-2 shadow-sm" :style="`background:${book.color}`">
                <span class="text-white text-[10px] font-bold leading-tight drop-shadow" x-text="book.title"></span>
              </div>
              <p class="text-[11px] text-gray-700 font-medium leading-tight" x-text="book.title"></p>
              <p class="text-[10px] text-gray-400" x-text="book.author"></p>
            </div>
          </template>
        </div>
      </div>
    </div>

    <!-- 책 상세 패널 -->
    <div x-show="selectedBook" x-cloak
         x-transition:enter="transition ease-out duration-300 transform" x-transition:enter-start="translate-y-full" x-transition:enter-end="translate-y-0"
         x-transition:leave="transition ease-in duration-200 transform" x-transition:leave-start="translate-y-0" x-transition:leave-end="translate-y-full"
         class="absolute inset-0 bg-white z-30 flex flex-col">

      <!-- 헤더 -->
      <div class="flex-shrink-0 flex items-center gap-2 px-4 py-3 border-b border-gray-100">
        <button @click="selectedBook=null" class="w-8 h-8 flex items-center justify-center text-gray-500 hover:bg-gray-100 rounded-full flex-shrink-0"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>
        <span class="font-bold text-gray-900 text-sm flex-1 truncate" x-text="selectedBook?.title"></span>
        <!-- 학생: 찜 하트 -->
        <button x-show="!isParent" class="w-8 h-8 flex items-center justify-center text-gray-400 hover:bg-gray-50 rounded-full flex-shrink-0"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg></button>

<script>
/* ── 드래그 캐러셀 ── */
function initCarousels() {
  let el = null, startX = 0, scrollStart = 0;
  let velX = 0, prevX = 0, prevT = 0, raf = null, moved = false;
  document.querySelectorAll('.carousel').forEach(carousel => {
    carousel.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      cancelAnimationFrame(raf);
      el = carousel; startX = e.clientX; scrollStart = carousel.scrollLeft;
      prevX = e.clientX; prevT = Date.now(); velX = 0; moved = false;
      e.preventDefault();
    });
    carousel.addEventListener('click', e => { if (moved) { e.stopPropagation(); e.preventDefault(); } }, true);
  });
  document.addEventListener('mousemove', e => {
    if (!el) return;
    const dx = e.clientX - startX;
    if (Math.abs(dx) > 4) { el.classList.add('grabbing'); moved = true; }
    el.scrollLeft = scrollStart - dx;
    const now = Date.now(), dt = Math.max(now - prevT, 1);
    velX = (prevX - e.clientX) / dt * 15; prevX = e.clientX; prevT = now;
  });
  document.addEventListener('mouseup', () => {
    if (!el) return;
    const target = el; el.classList.remove('grabbing'); el = null;
    const glide = () => { if (Math.abs(velX) < 0.3) return; target.scrollLeft += velX; velX *= 0.90; raf = requestAnimationFrame(glide); };
    glide();
  });
}

/* ── Pick 슬라이더 컴포넌트 ── */
function pickSlider() {
  return {
