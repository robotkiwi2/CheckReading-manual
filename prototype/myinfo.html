<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 정보 - CheckReading</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    html, body { height: 100%; }
    [x-cloak] { display: none !important; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
    #page-wrapper { animation: slideInRight 0.3s cubic-bezier(0.25,0.46,0.45,0.94); }
  </style>
</head>
<body class="bg-gray-200" style="height:100dvh; overflow:hidden;">
<div class="h-full flex items-stretch justify-center bg-gray-200" x-data="app()" x-init="init()">

  <!-- 사이드바 (lg+) -->
  <aside class="hidden lg:flex flex-col w-56 bg-white border-r border-gray-100 flex-shrink-0">
    <div class="px-5 py-5 border-b border-gray-100 flex items-center gap-3">
      <div class="w-8 h-8 bg-indigo-600 rounded-xl flex items-center justify-center"><span class="text-white text-xs font-bold">CR</span></div>
      <span class="font-bold text-gray-900">CheckReading</span>
    </div>
    <nav class="flex-1 py-4 px-3 flex flex-col gap-1">
      <a x-show="isParent" href="profiles.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 hover:bg-gray-50 text-sm"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v1h8v-1zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-1a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v1h-3zM4.75 12.094A5.973 5.973 0 004 15v1H1v-1a3 3 0 013.75-2.906z"/></svg>프로필</a>
      <a href="chat.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 hover:bg-gray-50 text-sm"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>소통</a>
      <a href="bookstore.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 hover:bg-gray-50 text-sm"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>서점</a>
      <a href="bookshelf.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 hover:bg-gray-50 text-sm"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 14c1.669 0 3.218.51 4.5 1.385A7.962 7.962 0 0114.5 14c1.255 0 2.443.29 3.5.804v-10A7.968 7.968 0 0014.5 4c-1.255 0-2.443.29-3.5.804V12a1 1 0 11-2 0V4.804z"/></svg>내 책장</a>
      <a href="myinfo.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-indigo-50 text-indigo-600 font-semibold text-sm"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>내 정보</a>
    </nav>
    <div class="px-4 py-4 border-t border-gray-100 flex items-center gap-3">
      <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold text-white flex-shrink-0" :style="`background:${userColor}`" x-text="user?.initial||'?'"></div>
      <div class="flex-1 min-w-0"><p class="text-sm font-semibold text-gray-800 truncate" x-text="user?.name"></p><p class="text-xs text-gray-400" x-text="isParent?'부모':'학생'"></p></div>
    </div>
  </aside>

  <!-- 메인 영역 -->
  <div id="page-wrapper" class="flex-1 flex flex-col min-w-0 bg-gray-50 max-w-3xl">

    <!-- 헤더 -->
    <header class="flex-shrink-0 bg-white border-b border-gray-100 px-4 py-3 flex items-center gap-3">
      <button onclick="goBack()" class="w-8 h-8 flex items-center justify-center text-gray-500 hover:bg-gray-100 rounded-full flex-shrink-0"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>
      <h1 class="font-bold text-gray-900">내 정보</h1>
    </header>

    <!-- 콘텐츠 -->
    <main class="flex-1 overflow-y-auto min-h-0">

      <!-- 프로필 카드 -->
      <div class="bg-white pt-8 pb-6 flex flex-col items-center">
        <div class="w-20 h-20 rounded-full flex items-center justify-center text-white text-2xl font-bold shadow-md mb-3"
             :style="`background:${userColor}`"
             x-text="user?.initial||'?'"></div>
        <h2 class="text-xl font-bold text-gray-900" x-text="user?.name"></h2>
        <span class="mt-1.5 px-3 py-0.5 rounded-full text-xs font-semibold"
              :class="isParent?'bg-indigo-100 text-indigo-600':'bg-emerald-100 text-emerald-600'"
              x-text="isParent?'부모 계정':'학생'"></span>
      </div>

      <!-- 학생: 독서 현황 -->
      <div x-show="!isParent" class="px-4 mt-4">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">독서 현황</p>
        <div class="grid grid-cols-2 gap-3">
          <div class="bg-white rounded-2xl p-4 text-center shadow-sm">
            <p class="text-2xl font-bold text-indigo-600">3</p>
            <p class="text-xs text-gray-400 mt-1">읽고 있는 책</p>
          </div>
          <div class="bg-white rounded-2xl p-4 text-center shadow-sm">
            <p class="text-2xl font-bold text-indigo-600">12</p>
            <p class="text-xs text-gray-400 mt-1">읽은 책</p>
          </div>
          <div class="bg-white rounded-2xl p-4 text-center shadow-sm">
            <p class="text-2xl font-bold text-orange-500">7</p>
            <p class="text-xs text-gray-400 mt-1">연속 독서일</p>
          </div>
          <div class="bg-white rounded-2xl p-4 text-center shadow-sm">
            <p class="text-2xl font-bold text-emerald-500">24.5h</p>
            <p class="text-xs text-gray-400 mt-1">총 독서 시간</p>
          </div>
        </div>
      </div>

      <!-- 학생: 레벨 -->
      <div x-show="!isParent" class="px-4 mt-4">
        <div class="bg-white rounded-2xl p-4 shadow-sm">
          <div class="flex items-center justify-between mb-2.5">
            <span class="text-sm font-semibold text-gray-800">현재 레벨</span>
            <span class="bg-indigo-100 text-indigo-600 text-xs font-bold px-2.5 py-0.5 rounded-full">Lv.3</span>
          </div>
          <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
            <div class="h-full bg-gradient-to-r from-indigo-400 to-indigo-600 rounded-full" style="width:65%"></div>
          </div>
          <p class="text-xs text-gray-400 mt-2">다음 레벨까지 3권을 더 읽어보세요</p>
        </div>
      </div>

      <!-- 부모: 자녀 현황 -->
      <div x-show="isParent" class="px-4 mt-4">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">자녀 현황</p>
        <div class="bg-white rounded-2xl divide-y divide-gray-50 shadow-sm">
          <div class="flex items-center gap-3 px-4 py-3.5">
            <div class="w-9 h-9 rounded-full flex items-center justify-center text-white text-sm font-bold flex-shrink-0" style="background:linear-gradient(135deg,#667eea,#764ba2)">홍</div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-semibold text-gray-800">홍길동</p>
              <p class="text-xs text-gray-400">Lv.3 · 읽는 중 3권</p>
            </div>
            <svg class="w-4 h-4 text-gray-300 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </div>
          <div class="flex items-center gap-3 px-4 py-3.5">
            <div class="w-9 h-9 rounded-full flex items-center justify-center text-white text-sm font-bold flex-shrink-0" style="background:linear-gradient(135deg,#f093fb,#f5576c)">성</div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-semibold text-gray-800">성춘향</p>
              <p class="text-xs text-gray-400">Lv.4 · 읽는 중 3권</p>
            </div>
            <svg class="w-4 h-4 text-gray-300 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </div>
        </div>
      </div>

      <!-- 설정 -->
      <div class="px-4 mt-4 mb-8">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">설정</p>
        <div class="bg-white rounded-2xl overflow-hidden shadow-sm divide-y divide-gray-50">
          <button class="w-full px-4 py-3.5 flex items-center gap-3 text-sm text-gray-700 hover:bg-gray-50 text-left">
            <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
            알림 설정
            <svg class="w-4 h-4 text-gray-300 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </button>
          <button class="w-full px-4 py-3.5 flex items-center gap-3 text-sm text-gray-700 hover:bg-gray-50 text-left">
            <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            계정 정보
            <svg class="w-4 h-4 text-gray-300 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </button>
          <button @click="logout()" class="w-full px-4 py-3.5 flex items-center gap-3 text-sm text-red-500 hover:bg-red-50 text-left">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            로그아웃
          </button>
        </div>
      </div>

    </main>

    <!-- 하단 탭바 (lg 미만) -->
    <nav class="lg:hidden flex-shrink-0 bg-white border-t border-gray-100 flex">
      <a x-show="isParent" href="profiles.html" class="flex-1 flex flex-col items-center py-2 gap-0.5 text-gray-300"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v1h8v-1zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-1a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v1h-3zM4.75 12.094A5.973 5.973 0 004 15v1H1v-1a3 3 0 013.75-2.906z"/></svg><span class="text-[10px]">프로필</span></a>
      <a href="chat.html" class="flex-1 flex flex-col items-center py-2 gap-0.5 text-gray-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg><span class="text-[10px]">소통</span></a>
      <a href="bookstore.html" class="flex-1 flex flex-col items-center py-2 gap-0.5 text-gray-300"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg><span class="text-[10px]">서점</span></a>
      <a href="bookshelf.html" class="flex-1 flex flex-col items-center py-2 gap-0.5 text-gray-300"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 14c1.669 0 3.218.51 4.5 1.385A7.962 7.962 0 0114.5 14c1.255 0 2.443.29 3.5.804v-10A7.968 7.968 0 0014.5 4c-1.255 0-2.443.29-3.5.804V12a1 1 0 11-2 0V4.804z"/></svg><span class="text-[10px]">내 책장</span></a>
      <a href="myinfo.html" class="flex-1 flex flex-col items-center py-2 gap-0.5 text-indigo-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg><span class="text-[10px] font-semibold">내 정보</span></a>
    </nav>
  </div>
</div>

<script>
function goBack() {
  const el = document.getElementById('page-wrapper');
  el.style.transition = 'transform 0.25s ease-in';
  el.style.transform = 'translateX(100%)';
  setTimeout(() => history.back(), 250);
}

function app() {
  const colors = [
    'linear-gradient(135deg,#667eea,#764ba2)',
    'linear-gradient(135deg,#f093fb,#f5576c)',
    'linear-gradient(135deg,#4facfe,#00f2fe)',
    'linear-gradient(135deg,#43e97b,#38f9d7)',
    'linear-gradient(135deg,#fa709a,#fee140)',
  ];
  return {
    user: null, isParent: false, userColor: colors[0],
    init() {
      this.user = JSON.parse(localStorage.getItem('cr_user') || 'null');
      if (!this.user) { window.location.href = 'index.html'; return; }
      this.isParent = this.user.type === 'parent';
      const idx = ((this.user.name || '').charCodeAt(0) || 0) % colors.length;
      this.userColor = colors[idx];
    },
    logout() { localStorage.removeItem('cr_user'); window.location.href = 'index.html'; },
  };
}
</script>
</body>
</html>
