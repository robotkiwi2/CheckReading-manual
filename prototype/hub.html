<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CheckReading 프로토타입</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-6">
  <div class="max-w-md w-full">
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-3">
        <span class="text-white text-xl font-bold">CR</span>
      </div>
      <h1 class="text-white text-2xl font-bold">CheckReading</h1>
      <p class="text-gray-400 text-sm mt-1">UI 프로토타입</p>
    </div>

    <div class="grid grid-cols-1 gap-3">
      <a href="login.html" class="bg-white/10 hover:bg-white/20 text-white rounded-2xl p-4 flex items-center gap-4 transition">
        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-lg">🔐</div>
        <div>
          <p class="font-semibold">로그인</p>
          <p class="text-xs text-gray-400">부모(소셜) / 학생(아이디) 로그인</p>
        </div>
        <svg class="w-4 h-4 text-gray-500 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </a>

      <a href="bookstore.html" class="bg-white/10 hover:bg-white/20 text-white rounded-2xl p-4 flex items-center gap-4 transition">
        <div class="w-10 h-10 bg-purple-500 rounded-xl flex items-center justify-center text-lg">🏪</div>
        <div>
          <p class="font-semibold">서점</p>
          <p class="text-xs text-gray-400">넷플릭스형 캐러셀 · 선반 · 전체보기</p>
        </div>
        <svg class="w-4 h-4 text-gray-500 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </a>

      <a href="bookshelf.html" class="bg-white/10 hover:bg-white/20 text-white rounded-2xl p-4 flex items-center gap-4 transition">
        <div class="w-10 h-10 bg-green-500 rounded-xl flex items-center justify-center text-lg">📚</div>
        <div>
          <p class="font-semibold">책장</p>
          <p class="text-xs text-gray-400">읽고 있는 책 · 읽은 책 · 찜 · 필독서</p>
        </div>
        <svg class="w-4 h-4 text-gray-500 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </a>

      <div class="bg-white/5 text-gray-600 rounded-2xl p-4 flex items-center gap-4 cursor-not-allowed">
        <div class="w-10 h-10 bg-gray-700 rounded-xl flex items-center justify-center text-lg">📖</div>
        <div>
          <p class="font-medium text-gray-500">뷰어</p>
          <p class="text-xs text-gray-600">준비 중</p>
        </div>
        <span class="ml-auto text-xs bg-gray-700 text-gray-500 px-2 py-0.5 rounded-full">WIP</span>
      </div>

      <div class="bg-white/5 text-gray-600 rounded-2xl p-4 flex items-center gap-4 cursor-not-allowed">
        <div class="w-10 h-10 bg-gray-700 rounded-xl flex items-center justify-center text-lg">📊</div>
        <div>
          <p class="font-medium text-gray-500">읽기 결과</p>
          <p class="text-xs text-gray-600">준비 중</p>
        </div>
        <span class="ml-auto text-xs bg-gray-700 text-gray-500 px-2 py-0.5 rounded-full">WIP</span>
      </div>
    </div>

    <p class="text-center text-gray-600 text-xs mt-6">Tailwind CSS + Alpine.js 프로토타입</p>
  </div>
</body>
</html>
